server {
    listen 80;
    server_name _;

    location /admin {
        proxy_pass http://app:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://app:3100;
        proxy_set_header Host $host;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
